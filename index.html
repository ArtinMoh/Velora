<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velora</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1A0820;
      --grid:     rgba(255,77,166,0.07);
      --pink:     #FF4DA6;
      --pink-lt:  #FF9DD3;
      --pink-dk:  #C2007A;
      --pink-dim: #7A1A52;
      --body-bg:  #FFE8F3;
      --body-mid: #FFD0E8;
      --eye:      #0D0010;
      --bubble-u: #FF4DA6;
      --bubble-a: #C2007A;
      --bub-txt:  #FFF0F8;
      --code-bg:  #0A001A;
      --code-txt: #FF9DD3;
      --black:    #0A0010;
      --input-bg: #100818;
      --text-dim: #FF70BD;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 20px 20px;
      image-rendering: pixelated;
    }

    .frame {
      max-width: 420px;
      margin: 0 auto;
      height: 88%;
      display: flex;
      flex-direction: column;
      padding: 0 2px;
    }

    /* ── TITLE ── */
    .velora-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.1rem;
      color: var(--pink-lt);
      text-align: center;
      padding: 22px 0 12px;
      flex-shrink: 0;
      text-shadow:
        3px 3px 0 var(--pink-dk),
        6px 6px 0 var(--black);
      letter-spacing: 0.12em;
    }

    /* ── MASCOT ZONE ── */
    .mascot-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 14px;
      min-height: 0;
      overflow: hidden;
    }

    /* bumps */
    .bumps-row {
      display: flex;
      justify-content: center;
      gap: 22px;
      flex-shrink: 0;
      margin-bottom: -28px;
      position: relative;
      z-index: 3;
    }

    .bump {
      width: 74px;
      height: 74px;
      background: var(--body-bg);
      border: 3px solid var(--black);
      border-radius: 4px;
      box-shadow:
        5px 5px 0 var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    /* pixel shine on bump top-left */
    .bump::before {
      content: '';
      position: absolute;
      top: 5px; left: 5px;
      width: 12px; height: 4px;
      background: rgba(255,255,255,0.45);
      border-radius: 0;
    }

    /* eye */
    .eye-socket {
      width: 26px;
      height: 36px;
      background: var(--eye);
      border-radius: 2px;
      position: relative;
      border: 2px solid rgba(255,255,255,0.08);
    }
    /* square pixel shine */
    .eye-socket::after {
      content: '';
      position: absolute;
      top: 4px; left: 4px;
      width: 6px; height: 6px;
      background: rgba(255,255,255,0.55);
      border-radius: 0;
    }

    /* blink — step-style for pixel feel */
    #sock-l { animation: blink 5.5s 0.5s  infinite steps(1); }
    #sock-r { animation: blink 5.5s 1.3s  infinite steps(1); }

    @keyframes blink {
      0%,84%,100% { transform: scaleY(1); }
      86%          { transform: scaleY(0.08); }
      90%          { transform: scaleY(1); }
    }

    .eye-socket.thinking { animation: think 1.8s ease-in-out infinite !important; }
    @keyframes think {
      0%,100% { transform: translateX(0)    scaleY(0.75); }
      33%     { transform: translateX(-6px) scaleY(0.65); }
      66%     { transform: translateX(6px)  scaleY(0.65); }
    }

    /* mascot body */
    .mascot-body {
      flex: 1;
      background: linear-gradient(170deg, var(--body-bg) 0%, var(--body-mid) 100%);
      border: 3px solid var(--black);
      border-radius: 6px;
      box-shadow:
        6px 6px 0 var(--black);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 2;
      min-height: 0;
    }
    /* corner pixel accents */
    .mascot-body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--pink-lt), transparent 40%, transparent 60%, var(--pink-lt));
      opacity: 0.5;
      z-index: 5;
    }

    /* ── LOCK PANEL ── */
    #lock-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 40px 28px;
    }

    .lock-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      letter-spacing: 0.14em;
      color: var(--pink-dim);
      text-transform: uppercase;
      text-align: center;
      line-height: 1.8;
    }

    .pwd-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--code-bg);
      border: 3px solid var(--black);
      border-radius: 2px;
      box-shadow: 3px 3px 0 var(--black);
      color: var(--pink-lt);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-align: center;
      outline: none;
      transition: border-color 0.1s, box-shadow 0.1s;
    }
    .pwd-input:focus {
      border-color: var(--pink);
      box-shadow: 3px 3px 0 var(--pink-dk);
    }

    .lock-error {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: #FF5050;
      height: 1rem;
      text-align: center;
      letter-spacing: 0.06em;
    }

    .unlock-btn {
      padding: 0.72rem 1.8rem;
      background: var(--pink);
      border: 3px solid var(--black);
      border-radius: 2px;
      box-shadow: 4px 4px 0 var(--black);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .unlock-btn:hover  { background: var(--pink-dk); }
    .unlock-btn:active { transform: translate(4px,4px); box-shadow: none; }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 14px 12px;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--pink-dk) transparent;
      min-height: 0;
    }
    .messages::-webkit-scrollbar       { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--pink-dk); }

    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }

    .bubble {
      max-width: 80%;
      padding: 8px 13px;
      border: 2px solid var(--black);
      border-radius: 2px;
      font-size: 0.86rem;
      line-height: 1.58;
    }
    .bubble.user {
      background: var(--bubble-u);
      color: var(--bub-txt);
      box-shadow: 3px 3px 0 var(--black);
    }
    .bubble.ai {
      background: var(--bubble-a);
      color: var(--bub-txt);
      box-shadow: 3px 3px 0 var(--black);
    }

    /* ── CODE BLOCKS ── */
    .bubble .code-block {
      background: var(--code-bg);
      border: 2px solid var(--pink);
      border-radius: 2px;
      padding: 10px;
      margin: 8px -4px 4px;
      overflow-x: auto;
      box-shadow: 3px 3px 0 var(--pink-dk);
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .code-lang {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.42rem;
      color: var(--pink);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .copy-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.38rem;
      background: var(--pink-dim);
      color: #fff;
      border: 2px solid var(--black);
      border-radius: 2px;
      padding: 3px 7px;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--black);
      transition: transform 0.08s, box-shadow 0.08s;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }
    .copy-btn:hover  { background: var(--pink); }
    .copy-btn:active { transform: translate(2px,2px); box-shadow: none; }
    .copy-btn.copied { background: #2a7a2a; box-shadow: 2px 2px 0 var(--black); }
    .code-block pre {
      font-family: 'VT323', monospace;
      font-size: 1rem;
      color: var(--code-txt);
      white-space: pre;
      line-height: 1.4;
    }
    .inline-code {
      background: rgba(255,77,166,0.18);
      border: 1px solid rgba(255,77,166,0.35);
      padding: 1px 5px;
      border-radius: 1px;
      font-family: 'VT323', monospace;
      font-size: 1.05em;
      color: #FFBADC;
    }

    /* thinking dots */
    .tdots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 8px 4px;
    }
    .tdot {
      width: 8px; height: 8px;
      background: var(--pink-lt);
      border-radius: 0;
      animation: dp 1.1s steps(1) infinite;
    }
    .tdot:nth-child(1) { animation-delay: 0s; }
    .tdot:nth-child(2) { animation-delay: 0.22s; border-radius: 50%; }
    .tdot:nth-child(3) { animation-delay: 0.44s; }
    @keyframes dp {
      0%,100% { opacity: 0.2; transform: scale(0.7); }
      50%     { opacity: 1;   transform: scale(1);   }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--input-bg);
      border: 3px solid var(--black);
      border-radius: 2px;
      box-shadow: 5px 5px 0 var(--black);
      margin: 8px 14px 14px;
      padding: 0 12px;
      height: 50px;
      flex-shrink: 0;
    }
    .input-bar.show { display: flex; }

    .chat-ta {
      flex: 1;
      height: 22px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--pink-lt);
      font-family: 'Inter', sans-serif;
      font-size: 0.86rem;
      resize: none;
      line-height: 22px;
      overflow: hidden;
      padding: 0;
    }
    .chat-ta::placeholder { color: var(--pink-dim); line-height: 22px; }

    .send-btn {
      width: 34px; height: 34px;
      background: var(--pink);
      border: 2px solid var(--black);
      border-radius: 2px;
      box-shadow: 3px 3px 0 var(--black);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .send-btn:hover  { background: var(--pink-dk); }
    .send-btn:active { transform: translate(3px,3px); box-shadow: none; }
    .send-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: 3px 3px 0 var(--black); }
    .send-btn svg { width: 14px; height: 14px; fill: #fff; }
  </style>
</head>
<body>
<div class="frame">

  <div class="velora-title">VELORA</div>

  <div class="mascot-zone">

    <div class="bumps-row">
      <div class="bump"><div class="eye-socket" id="sock-l"></div></div>
      <div class="bump"><div class="eye-socket" id="sock-r"></div></div>
    </div>

    <div class="mascot-body">

      <div id="lock-panel">
        <div class="lock-label">— Enter Access Code —</div>
        <input type="password" id="pwd" class="pwd-input" placeholder="••••••" autocomplete="off">
        <div class="lock-error" id="lock-err"></div>
        <button id="unlock-btn" class="unlock-btn">START</button>
      </div>

      <div class="messages" id="msgs" style="display:none;"></div>

    </div>
  </div>

  <div class="input-bar" id="input-bar">
    <textarea class="chat-ta" id="chat-ta" placeholder="Type your message…" rows="1"></textarea>
    <button class="send-btn" id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>
<script>
  const WORKER = "https://shrill-hall-b136.hmdrgemeniacc.workers.dev/";
  const PASS   = "apple";

  const sockL   = document.getElementById('sock-l');
  const sockR   = document.getElementById('sock-r');
  const msgsEl  = document.getElementById('msgs');
  const ta      = document.getElementById('chat-ta');
  const sendBtn = document.getElementById('send-btn');
  const inputBar = document.getElementById('input-bar');

  /* ── MARKDOWN PARSER ── */
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function parseMsg(text) {
    // fenced code blocks
    let html = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      return `<div class="code-block"><div class="code-header"><div class="code-lang">${lang || 'code'}</div><button class="copy-btn" onclick="copyCode(this)">COPY</button></div><pre>${escHtml(code.trim())}</pre></div>`;
    });
    // inline code
    html = html.replace(/`([^`\n]+)`/g, '<code class="inline-code">$1</code>');
    // bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // newlines (but not inside code blocks — handled by pre)
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  /* ── COPY CODE ── */
  function copyCode(btn) {
    const code = btn.closest('.code-block').querySelector('pre').innerText;
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = 'DONE!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
      btn.textContent = 'ERR';
      setTimeout(() => btn.textContent = 'COPY', 2000);
    });
  }

  /* ── UNLOCK ── */
  function tryUnlock() {
    if (document.getElementById('pwd').value.trim() === PASS) {
      document.getElementById('lock-panel').style.display = 'none';
      msgsEl.style.display = 'flex';
      inputBar.classList.add('show');
      ta.focus();
    } else {
      const err = document.getElementById('lock-err');
      err.textContent = 'WRONG CODE!';
      document.getElementById('pwd').value = '';
      setTimeout(() => err.textContent = '', 2200);
    }
  }
  document.getElementById('unlock-btn').addEventListener('click', tryUnlock);
  document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

  /* ── EYES ── */
  function setThinking(on) {
    [sockL, sockR].forEach(s => on ? s.classList.add('thinking') : s.classList.remove('thinking'));
  }

  /* ── TEXTAREA resize ── */
  ta.addEventListener('input', () => {
    sendBtn.disabled = !ta.value.trim() || busy;
    ta.style.height = 'auto';
    const h = Math.min(ta.scrollHeight, 110);
    ta.style.height = h + 'px';
    if (h > 26) {
      ta.style.lineHeight = '1.5';
      inputBar.style.height = 'auto';
      inputBar.style.padding = '13px 12px';
      inputBar.style.alignItems = 'flex-end';
    } else {
      ta.style.lineHeight = '22px';
      inputBar.style.height = '50px';
      inputBar.style.padding = '0 12px';
      inputBar.style.alignItems = 'center';
    }
  });

  /* ── CHAT ── */
  let history = [], busy = false;

  function addBubble(role, text) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const b = document.createElement('div');
    b.className = 'bubble ' + role;
    b.innerHTML = parseMsg(text);
    row.appendChild(b);
    msgsEl.appendChild(row);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function addThinking() {
    const row = document.createElement('div');
    row.className = 'msg-row ai'; row.id = 'tr';
    row.innerHTML = '<div class="bubble ai"><div class="tdots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>';
    msgsEl.appendChild(row);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function removeThinking() { const r = document.getElementById('tr'); if (r) r.remove(); }

  function resetInput() {
    ta.style.height = 'auto';
    ta.style.lineHeight = '22px';
    inputBar.style.height = '50px';
    inputBar.style.padding = '0 12px';
    inputBar.style.alignItems = 'center';
  }

  async function send() {
    const text = ta.value.trim();
    if (!text || busy) return;
    busy = true; sendBtn.disabled = true;
    ta.value = ''; resetInput();

    addBubble('user', text);
    history.push({ role: 'user', content: text });
    addThinking(); setThinking(true);

    try {
      const res  = await fetch(WORKER, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Access-Password': PASS },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      removeThinking(); setThinking(false);

      let reply;
      if (data?.content?.[0]?.text)  reply = data.content[0].text;
      else if (data?.error?.message) reply = '⚠️ ' + data.error.message;
      else                           reply = '⚠️ ' + JSON.stringify(data).slice(0, 160);

      addBubble('ai', reply);
      if (!reply.startsWith('⚠️')) history.push({ role: 'assistant', content: reply });
    } catch {
      removeThinking(); setThinking(false);
      addBubble('ai', '⚠️ Connection error.');
    }
    busy = false;
    sendBtn.disabled = !ta.value.trim();
    ta.focus();
  }

  sendBtn.addEventListener('click', send);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
</script>
</body>
</html>
