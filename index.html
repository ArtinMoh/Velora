<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velora</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tan:        #8B7253;
      --tan-dark:   #6E5A3F;
      --tan-light:  #A08C6A;
      --cream:      #EDEAE3;
      --eye:        #1C1A17;
      --text-dark:  #3D3228;
      --text-mid:   #9A8B76;
      --bubble:     #8B7253;
      --bubble-txt: #F6F0E6;
    }

    html, body {
      height: 100%;
      background: var(--tan);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── FRAME ── */
    .frame {
      max-width: 430px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── TITLE ── */
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.85rem;
      letter-spacing: 0.42em;
      color: #F5EDE0;
      text-align: center;
      padding: 22px 0 14px;
      flex-shrink: 0;
      text-shadow: 0 1px 12px rgba(0,0,0,0.18);
    }

    /* ── MASCOT ZONE ── */
    .mascot-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 18px;
      overflow: hidden;
      min-height: 0;
    }

    /* bumps */
    .bumps {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-shrink: 0;
      margin-bottom: -24px;
      position: relative;
      z-index: 2;
    }

    .bump {
      width: 72px;
      height: 72px;
      background: var(--cream);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 -6px 20px rgba(0,0,0,0.18),
        inset 0 3px 10px rgba(0,0,0,0.07);
    }

    /* eyes */
    .eye {
      width: 26px;
      height: 38px;
      background: var(--eye);
      border-radius: 50%;
      transform-origin: center;
    }
    #eye-l { animation: blink 5.5s 0.5s  infinite; }
    #eye-r { animation: blink 5.5s 1.25s infinite; }

    @keyframes blink {
      0%, 86%, 100% { transform: scaleY(1); }
      90%           { transform: scaleY(0.06); }
      94%           { transform: scaleY(1); }
    }

    .eye.thinking { animation: look 2s ease-in-out infinite !important; }
    @keyframes look {
      0%, 100% { transform: translateX(0)    scaleY(0.82); }
      33%      { transform: translateX(-6px) scaleY(0.72); }
      66%      { transform: translateX(6px)  scaleY(0.72); }
    }

    /* mascot body */
    .body {
      flex: 1;
      background: var(--cream);
      border-radius: 48px 48px 22px 22px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
      box-shadow: inset 0 10px 28px rgba(0,0,0,0.06);
      min-height: 0;
    }

    /* ── LOCK PANEL ── */
    #lock-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px 30px;
    }

    .lock-label {
      font-size: 0.71rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-mid);
    }

    .pwd-input {
      width: 100%;
      padding: 0.72rem 1rem;
      background: rgba(139,114,83,0.07);
      border: 1px solid rgba(139,114,83,0.22);
      border-radius: 10px;
      color: var(--text-dark);
      font-size: 1rem;
      letter-spacing: 0.14em;
      text-align: center;
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.22s, box-shadow 0.22s;
    }
    .pwd-input:focus {
      border-color: rgba(139,114,83,0.48);
      box-shadow: 0 0 0 3px rgba(139,114,83,0.10);
    }

    .lock-error {
      font-size: 0.73rem;
      color: #C06040;
      height: 1rem;
      letter-spacing: 0.04em;
    }

    .unlock-btn {
      padding: 0.65rem 2.4rem;
      background: var(--tan);
      border: none;
      border-radius: 10px;
      color: #F5EDE0;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(110,90,63,0.35);
    }
    .unlock-btn:hover  { background: var(--tan-dark); box-shadow: 0 6px 20px rgba(110,90,63,0.45); }
    .unlock-btn:active { transform: scale(0.95); }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 18px 14px;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: none;
      min-height: 0;
    }
    .messages::-webkit-scrollbar { display: none; }

    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai   { justify-content: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 9px 15px;
      border-radius: 18px;
      font-size: 0.87rem;
      line-height: 1.58;
      background: var(--bubble);
      color: var(--bubble-txt);
    }
    .bubble.user { border-bottom-right-radius: 4px; }
    .bubble.ai   { border-bottom-left-radius: 4px; }

    /* thinking dots (square–circle–square like mockup) */
    .tdots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 15px;
    }
    .tdot {
      width: 7px; height: 7px;
      background: var(--bubble);
      animation: dp 1.2s ease-in-out infinite;
    }
    .tdot:nth-child(1) { border-radius: 2px; }
    .tdot:nth-child(2) { border-radius: 50%; animation-delay: 0.2s; }
    .tdot:nth-child(3) { border-radius: 2px; animation-delay: 0.4s; }
    @keyframes dp {
      0%, 100% { opacity: 0.22; transform: scale(0.78); }
      50%      { opacity: 1;    transform: scale(1);    }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      display: none;
      align-items: flex-end;
      gap: 11px;
      background: #141210;
      margin: 8px 18px 14px;
      padding: 11px 14px;
      border-radius: 14px;
      flex-shrink: 0;
    }
    .input-bar.show { display: flex; }

    .chat-ta {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #C8BFB0;
      font-family: 'Inter', sans-serif;
      font-size: 0.87rem;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      padding: 2px 0;
    }
    .chat-ta::placeholder { color: #5C5248; }

    .send-btn {
      width: 34px; height: 34px;
      background: var(--tan);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    .send-btn:hover  { background: var(--tan-dark); }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.32; cursor: default; }
    .send-btn svg { width: 15px; height: 15px; fill: #F5EDE0; }
  </style>
</head>
<body>
<div class="frame">

  <div class="title">V e l o r a</div>

  <div class="mascot-zone">

    <!-- bumps / eyes -->
    <div class="bumps">
      <div class="bump"><div class="eye" id="eye-l"></div></div>
      <div class="bump"><div class="eye" id="eye-r"></div></div>
    </div>

    <!-- mascot body -->
    <div class="body">

      <!-- lock panel -->
      <div id="lock-panel">
        <div class="lock-label">Enter access code</div>
        <input type="password" id="pwd" class="pwd-input" placeholder="••••••" autocomplete="off">
        <div class="lock-error" id="lock-err"></div>
        <button id="unlock-btn" class="unlock-btn">Continue</button>
      </div>

      <!-- messages -->
      <div class="messages" id="msgs" style="display:none;"></div>

    </div>
  </div>

  <!-- input bar -->
  <div class="input-bar" id="input-bar">
    <textarea class="chat-ta" id="chat-ta" placeholder="Type Your Message..." rows="1"></textarea>
    <button class="send-btn" id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>
<script>
  const WORKER = "https://shrill-hall-b136.hmdrgemeniacc.workers.dev/";
  const PASS   = "apple";

  const eyeL    = document.getElementById('eye-l');
  const eyeR    = document.getElementById('eye-r');
  const msgsEl  = document.getElementById('msgs');
  const ta      = document.getElementById('chat-ta');
  const sendBtn = document.getElementById('send-btn');

  /* ── UNLOCK ── */
  function tryUnlock() {
    if (document.getElementById('pwd').value.trim() === PASS) {
      document.getElementById('lock-panel').style.display = 'none';
      msgsEl.style.display = 'flex';
      document.getElementById('input-bar').classList.add('show');
      ta.focus();
    } else {
      const err = document.getElementById('lock-err');
      err.textContent = 'Incorrect code.';
      document.getElementById('pwd').value = '';
      setTimeout(() => err.textContent = '', 2000);
    }
  }
  document.getElementById('unlock-btn').addEventListener('click', tryUnlock);
  document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

  /* ── EYES ── */
  function setThinking(on) {
    [eyeL, eyeR].forEach(e => on ? e.classList.add('thinking') : e.classList.remove('thinking'));
  }

  /* ── CHAT ── */
  let history = [], busy = false;

  ta.addEventListener('input', () => {
    sendBtn.disabled = !ta.value.trim() || busy;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });

  function addBubble(role, text) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const b = document.createElement('div');
    b.className = 'bubble ' + role;
    b.textContent = text;
    row.appendChild(b);
    msgsEl.appendChild(row);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function addThinking() {
    const row = document.createElement('div');
    row.className = 'msg-row ai'; row.id = 'tr';
    row.innerHTML = '<div class="tdots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>';
    msgsEl.appendChild(row);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function removeThinking() { const r = document.getElementById('tr'); if (r) r.remove(); }

  async function send() {
    const text = ta.value.trim();
    if (!text || busy) return;
    busy = true; sendBtn.disabled = true;
    ta.value = ''; ta.style.height = 'auto';

    addBubble('user', text);
    history.push({ role: 'user', content: text });
    addThinking(); setThinking(true);

    try {
      const res  = await fetch(WORKER, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Access-Password': PASS },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      removeThinking(); setThinking(false);

      let reply;
      if (data?.content?.[0]?.text)  reply = data.content[0].text;
      else if (data?.error?.message) reply = '⚠️ ' + data.error.message;
      else                           reply = '⚠️ ' + JSON.stringify(data).slice(0, 160);

      addBubble('ai', reply);
      if (!reply.startsWith('⚠️')) history.push({ role: 'assistant', content: reply });
    } catch {
      removeThinking(); setThinking(false);
      addBubble('ai', '⚠️ Connection error.');
    }
    busy = false;
    sendBtn.disabled = !ta.value.trim();
    ta.focus();
  }

  sendBtn.addEventListener('click', send);
  ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
</script>
</body>
</html>
