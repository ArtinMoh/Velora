<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velora</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tan:      #8B7253;
      --tan-dk:   #6A5438;
      --tan-lt:   #A08B69;
      --cream-hi: #F7F4EE;
      --cream:    #EDE9E1;
      --cream-dk: #D9D4C9;
      --eye-col:  #17140F;
      --bubble:   #8B7253;
      --bub-txt:  #F6EFE2;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #A08460 0%, #8B7253 40%, #6A5438 100%);
    }

    .frame {
      max-width: 420px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── TITLE ── */
    .velora-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.75rem;
      letter-spacing: 0.46em;
      color: #F8F0E0;
      text-align: center;
      padding: 20px 0 10px;
      flex-shrink: 0;
      text-shadow: 0 2px 18px rgba(0,0,0,0.28);
    }

    /* ── MASCOT ── */
    .mascot-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
      min-height: 0;
      overflow: hidden;
    }

    /* bumps row — sits above body */
    .bumps-row {
      display: flex;
      justify-content: center;
      gap: 26px;
      flex-shrink: 0;
      margin-bottom: -28px;
      position: relative;
      z-index: 3;
    }

    .bump {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 36% 30%, var(--cream-hi) 0%, var(--cream) 50%, var(--cream-dk) 100%);
      box-shadow:
        0 -6px 22px rgba(0,0,0,0.22),
        0  8px 18px rgba(0,0,0,0.20),
        inset 0  5px 14px rgba(255,255,255,0.75),
        inset 0 -5px 12px rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* eye socket — subtle recess */
    .eye-socket {
      width: 38px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 45% 40%, #2a261f 0%, var(--eye-col) 60%);
      box-shadow:
        inset 0 3px 8px rgba(0,0,0,0.55),
        inset 0 -2px 6px rgba(0,0,0,0.35),
        0 2px 6px rgba(0,0,0,0.3);
      position: relative;
      overflow: visible;
    }

    /* blink: scale the socket vertically */
    #sock-l { animation: blink 6s 0.6s  infinite; }
    #sock-r { animation: blink 6s 1.45s infinite; }

    @keyframes blink {
      0%, 84%, 100% { transform: scaleY(1); }
      88%            { transform: scaleY(0.04); }
      92%            { transform: scaleY(1); }
    }

    .eye-socket.thinking { animation: think 2.2s ease-in-out infinite !important; }
    @keyframes think {
      0%, 100% { transform: translateX(0)    scaleY(0.78); }
      35%      { transform: translateX(-7px) scaleY(0.68); }
      70%      { transform: translateX(7px)  scaleY(0.68); }
    }

    /* eye shine */
    .eye-socket::after {
      content: '';
      position: absolute;
      top: 18%; left: 22%;
      width: 30%; height: 22%;
      background: rgba(255,255,255,0.48);
      border-radius: 50%;
      transform: rotate(-25deg);
      pointer-events: none;
    }

    /* mascot body */
    .mascot-body {
      flex: 1;
      border-radius: 52px 52px 24px 24px;
      background: linear-gradient(175deg, var(--cream-hi) 0%, var(--cream) 45%, var(--cream-dk) 100%);
      box-shadow:
        inset 0  14px 36px rgba(255,255,255,0.60),
        inset 0 -10px 28px rgba(0,0,0,0.08),
        inset 3px 0   20px rgba(255,255,255,0.25),
        inset -3px 0  20px rgba(0,0,0,0.05),
        0 24px 60px rgba(0,0,0,0.28),
        0  6px 16px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 2;
      min-height: 0;
    }

    /* rim highlight at very top of body */
    .mascot-body::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent);
      border-radius: 50%;
      z-index: 4;
    }

    /* ── LOCK PANEL ── */
    #lock-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 48px 32px 40px;
    }

    .lock-label {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #9A8B76;
    }

    .pwd-wrap {
      width: 100%;
      position: relative;
    }
    .pwd-input {
      width: 100%;
      padding: 0.8rem 1.1rem;
      background: rgba(139,114,83,0.06);
      border: 1px solid rgba(139,114,83,0.20);
      border-radius: 12px;
      color: #3D3228;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-align: center;
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.22s, box-shadow 0.22s;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.06);
    }
    .pwd-input:focus {
      border-color: rgba(139,114,83,0.45);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.07), 0 0 0 3px rgba(139,114,83,0.10);
    }

    .lock-error {
      font-size: 0.72rem;
      color: #B85C38;
      height: 1rem;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .unlock-btn {
      padding: 0.7rem 2.6rem;
      background: linear-gradient(160deg, var(--tan-lt) 0%, var(--tan) 50%, var(--tan-dk) 100%);
      border: none;
      border-radius: 12px;
      color: #F5EDE0;
      font-size: 0.76rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      box-shadow:
        0 6px 22px rgba(110,84,56,0.40),
        0 2px  6px rgba(0,0,0,0.18),
        inset 0 1px 2px rgba(255,255,255,0.25);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .unlock-btn:hover  { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(110,84,56,0.50), 0 3px 8px rgba(0,0,0,0.22), inset 0 1px 2px rgba(255,255,255,0.25); }
    .unlock-btn:active { transform: scale(0.96); }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 18px 14px;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: none;
      min-height: 0;
    }
    .messages::-webkit-scrollbar { display: none; }

    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }

    .bubble {
      max-width: 78%;
      padding: 9px 15px;
      border-radius: 18px;
      font-size: 0.86rem;
      line-height: 1.58;
      background: linear-gradient(135deg, var(--tan-lt) 0%, var(--tan) 60%, var(--tan-dk) 100%);
      color: var(--bub-txt);
      box-shadow: 0 3px 12px rgba(0,0,0,0.16);
    }
    .bubble.user { border-bottom-right-radius: 4px; }
    .bubble.ai   { border-bottom-left-radius: 4px; }

    /* thinking dots */
    .tdots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 15px;
    }
    .tdot {
      width: 7px; height: 7px;
      background: var(--tan);
      opacity: 0.7;
      animation: dp 1.3s ease-in-out infinite;
    }
    .tdot:nth-child(1) { border-radius: 2px; }
    .tdot:nth-child(2) { border-radius: 50%; animation-delay: 0.22s; }
    .tdot:nth-child(3) { border-radius: 2px; animation-delay: 0.44s; }
    @keyframes dp {
      0%, 100% { opacity: 0.2; transform: scale(0.75); }
      50%      { opacity: 0.9; transform: scale(1);    }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: #131009;
      margin: 8px 16px 14px;
      padding: 0 14px;
      height: 50px;
      border-radius: 14px;
      flex-shrink: 0;
      box-shadow:
        0 8px 28px rgba(0,0,0,0.35),
        inset 0 1px 3px rgba(255,255,255,0.04);
    }
    .input-bar.show { display: flex; }

    .chat-ta {
      flex: 1;
      height: 22px;
      background: transparent;
      border: none;
      outline: none;
      color: #C8BFB0;
      font-family: 'Inter', sans-serif;
      font-size: 0.86rem;
      resize: none;
      line-height: 22px;
      overflow: hidden;
      padding: 0;
      display: block;
    }
    .chat-ta::placeholder {
      color: #5A5248;
      line-height: 22px;
    }

    .send-btn {
      width: 32px; height: 32px;
      background: linear-gradient(145deg, var(--tan-lt), var(--tan-dk));
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.2);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .send-btn:hover  { transform: scale(1.06); box-shadow: 0 5px 14px rgba(0,0,0,0.35); }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.28; cursor: default; transform: none; }
    .send-btn svg { width: 14px; height: 14px; fill: #F5EDE0; }
  </style>
</head>
<body>
<div class="frame">

  <div class="velora-title">V e l o r a</div>

  <div class="mascot-zone">

    <div class="bumps-row">
      <div class="bump">
        <div class="eye-socket" id="sock-l"></div>
      </div>
      <div class="bump">
        <div class="eye-socket" id="sock-r"></div>
      </div>
    </div>

    <div class="mascot-body">

      <div id="lock-panel">
        <div class="lock-label">Enter access code</div>
        <div class="pwd-wrap">
          <input type="password" id="pwd" class="pwd-input" placeholder="••••••" autocomplete="off">
        </div>
        <div class="lock-error" id="lock-err"></div>
        <button id="unlock-btn" class="unlock-btn">Continue</button>
      </div>

      <div class="messages" id="msgs" style="display:none;"></div>

    </div>
  </div>

  <div class="input-bar" id="input-bar">
    <textarea class="chat-ta" id="chat-ta" placeholder="Type your message…" rows="1"></textarea>
    <button class="send-btn" id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>
<script>
  const WORKER = "https://shrill-hall-b136.hmdrgemeniacc.workers.dev/";
  const PASS   = "apple";

  const sockL   = document.getElementById('sock-l');
  const sockR   = document.getElementById('sock-r');
  const msgsEl  = document.getElementById('msgs');
  const ta      = document.getElementById('chat-ta');
  const sendBtn = document.getElementById('send-btn');

  /* ── UNLOCK ── */
  function tryUnlock() {
    if (document.getElementById('pwd').value.trim() === PASS) {
      document.getElementById('lock-panel').style.display = 'none';
      msgsEl.style.display = 'flex';
      document.getElementById('input-bar').classList.add('show');
      ta.focus();
    } else {
      const err = document.getElementById('lock-err');
      err.textContent = 'Incorrect code.';
      document.getElementById('pwd').value = '';
      setTimeout(() => err.textContent = '', 2200);
    }
  }
  document.getElementById('unlock-btn').addEventListener('click', tryUnlock);
  document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

  /* ── EYES ── */
  function setThinking(on) {
    [sockL, sockR].forEach(s => on ? s.classList.add('thinking') : s.classList.remove('thinking'));
  }

  /* ── TEXTAREA auto-resize ── */
  ta.addEventListener('input', () => {
    sendBtn.disabled = !ta.value.trim() || busy;
    ta.style.height = 'auto';
    const h = Math.min(ta.scrollHeight, 110);
    ta.style.height = h + 'px';
    ta.style.lineHeight = ta.scrollHeight <= 30 ? '22px' : '1.5';
    document.getElementById('input-bar').style.height = h > 30 ? 'auto' : '50px';
    document.getElementById('input-bar').style.padding = h > 30 ? '14px' : '0 14px';
    document.getElementById('input-bar').style.alignItems = h > 30 ? 'flex-end' : 'center';
  });

  /* ── CHAT ── */
  let history = [], busy = false;

  function addBubble(role, text) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const b = document.createElement('div');
    b.className = 'bubble ' + role;
    b.textContent = text;
    row.appendChild(b);
    msgsEl.appendChild(row);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function addThinking() {
    const row = document.createElement('div');
    row.className = 'msg-row ai'; row.id = 'tr';
    row.innerHTML = '<div class="tdots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>';
    msgsEl.appendChild(row);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function removeThinking() { const r = document.getElementById('tr'); if (r) r.remove(); }

  async function send() {
    const text = ta.value.trim();
    if (!text || busy) return;
    busy = true; sendBtn.disabled = true;
    ta.value = '';
    ta.style.height = 'auto';
    ta.style.lineHeight = '22px';
    document.getElementById('input-bar').style.height = '50px';
    document.getElementById('input-bar').style.padding = '0 14px';
    document.getElementById('input-bar').style.alignItems = 'center';

    addBubble('user', text);
    history.push({ role: 'user', content: text });
    addThinking(); setThinking(true);

    try {
      const res  = await fetch(WORKER, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Access-Password': PASS },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      removeThinking(); setThinking(false);

      let reply;
      if (data?.content?.[0]?.text)  reply = data.content[0].text;
      else if (data?.error?.message) reply = '⚠️ ' + data.error.message;
      else                           reply = '⚠️ ' + JSON.stringify(data).slice(0, 160);

      addBubble('ai', reply);
      if (!reply.startsWith('⚠️')) history.push({ role: 'assistant', content: reply });
    } catch {
      removeThinking(); setThinking(false);
      addBubble('ai', '⚠️ Connection error.');
    }
    busy = false;
    sendBtn.disabled = !ta.value.trim();
    ta.focus();
  }

  sendBtn.addEventListener('click', send);
  ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
</script>
</body>
</html>
