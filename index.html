<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D0C0A;
      --surface:   #161512;
      --surface2:  #1E1D19;
      --border:    #2C2B26;
      --beige:     #E4D5B7;
      --beige-dim: #9E8E75;
      --beige-acc: #C9B48A;
      --text:      #D8CCB8;
      --text-dim:  #7A7060;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── PASSWORD SCREEN ── */
    #lock-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2rem;
      background: var(--bg);
      z-index: 100;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #lock-screen.hidden {
      opacity: 0;
      transform: translateY(-16px);
      pointer-events: none;
    }

    .lock-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--beige);
    }
    .lock-logo span {
      color: var(--beige-dim);
      font-style: italic;
    }

    .lock-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      width: 100%;
      max-width: 320px;
      padding: 0 1.5rem;
    }

    .lock-label {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .input-wrap {
      position: relative;
      width: 100%;
    }
    .input-wrap input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--beige);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      outline: none;
      transition: border-color 0.25s;
      text-align: center;
    }
    .input-wrap input:focus {
      border-color: var(--beige-dim);
    }
    /* signature glow line */
    .input-wrap::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--beige-acc), transparent);
      transition: transform 0.35s ease;
    }
    .input-wrap:focus-within::after {
      transform: translateX(-50%) scaleX(1);
    }

    .lock-error {
      font-size: 0.78rem;
      color: #b07a5a;
      letter-spacing: 0.04em;
      height: 1rem;
      transition: opacity 0.2s;
    }

    .lock-btn {
      width: 100%;
      padding: 0.7rem;
      background: transparent;
      border: 1px solid var(--beige-dim);
      border-radius: 6px;
      color: var(--beige);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .lock-btn:hover {
      background: var(--surface);
      border-color: var(--beige);
    }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    #chat-screen.visible {
      display: flex;
    }

    /* Header */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .chat-header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--beige);
    }
    .chat-header-subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #7aab7a;
      box-shadow: 0 0 6px #7aab7a88;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      font-weight: 500;
    }
    .avatar.ai  { background: var(--surface2); border: 1px solid var(--border); color: var(--beige-dim); }
    .avatar.usr { background: var(--beige-acc); color: var(--bg); }

    .bubble {
      padding: 0.7rem 1rem;
      border-radius: 12px;
      max-width: calc(100% - 50px);
      font-size: 0.92rem;
      line-height: 1.65;
    }
    .bubble.ai {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-top-left-radius: 4px;
    }
    .bubble.user {
      background: var(--surface2);
      border: 1px solid #2e2c27;
      color: var(--beige);
      border-top-right-radius: 4px;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex; gap: 4px; align-items: center; padding: 4px 2px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--beige-dim);
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Input area */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 1rem 1.5rem;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      max-width: 760px;
      margin: 0 auto;
    }
    .chat-input {
      flex: 1;
      padding: 0.65rem 0.9rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.2s;
      overflow-y: auto;
    }
    .chat-input:focus { border-color: var(--beige-dim); }
    .chat-input::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 40px; height: 40px;
      flex-shrink: 0;
      background: var(--beige-acc);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    .send-btn:hover  { background: var(--beige); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn svg { width: 16px; height: 16px; fill: var(--bg); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
      letter-spacing: 0.04em;
    }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 3rem 1rem;
      max-width: 420px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .welcome-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 300;
      color: var(--beige);
      letter-spacing: 0.06em;
    }
    .welcome-sub {
      font-size: 0.82rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      .chat-header { padding: 0.8rem 1rem; }
      .messages { padding: 1rem 0.75rem; }
      .input-area { padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- PASSWORD SCREEN -->
  <div id="lock-screen">
    <div class="lock-logo">Chat<span>AI</span></div>
    <div class="lock-box">
      <div class="lock-label">Enter access code to continue</div>
      <div class="input-wrap">
        <input type="password" id="pwd-input" placeholder="••••••" autocomplete="off" />
      </div>
      <div class="lock-error" id="lock-error"></div>
      <button class="lock-btn" id="unlock-btn">Continue</button>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen">
    <div class="chat-header">
      <div>
        <div class="chat-header-title">ChatAI</div>
        <div class="chat-header-subtitle">Powered by Claude</div>
      </div>
      <div class="status-dot"></div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-title">Good to have you here.</div>
        <div class="welcome-sub">Ask me anything — I'm here to help.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Type a message…" rows="1"></textarea>
        <button class="send-btn" id="send-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="hint">Press Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://shrill-hall-b136.hmdrgemeniacc.workers.dev/";
    const ACCESS_PASSWORD = "apple";

    // ── PASSWORD LOGIC ──
    const lockScreen  = document.getElementById("lock-screen");
    const chatScreen  = document.getElementById("chat-screen");
    const pwdInput    = document.getElementById("pwd-input");
    const unlockBtn   = document.getElementById("unlock-btn");
    const lockError   = document.getElementById("lock-error");

    function tryUnlock() {
      if (pwdInput.value.trim() === ACCESS_PASSWORD) {
        lockScreen.classList.add("hidden");
        setTimeout(() => {
          lockScreen.style.display = "none";
          chatScreen.classList.add("visible");
          chatInput.focus();
        }, 600);
      } else {
        lockError.textContent = "Incorrect code. Try again.";
        pwdInput.value = "";
        pwdInput.focus();
        setTimeout(() => lockError.textContent = "", 2500);
      }
    }

    unlockBtn.addEventListener("click", tryUnlock);
    pwdInput.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

    // ── CHAT LOGIC ──
    const messagesEl = document.getElementById("messages");
    const chatInput  = document.getElementById("chat-input");
    const sendBtn    = document.getElementById("send-btn");

    let history = [];
    let isTyping = false;

    function removeWelcome() {
      const w = messagesEl.querySelector(".welcome");
      if (w) w.remove();
    }

    function addMessage(role, text) {
      removeWelcome();
      const isUser = role === "user";
      const row = document.createElement("div");
      row.className = `msg-row ${isUser ? "user" : ""}`;

      const avatar = document.createElement("div");
      avatar.className = `avatar ${isUser ? "usr" : "ai"}`;
      avatar.textContent = isUser ? "You" : "AI";

      const bubble = document.createElement("div");
      bubble.className = `bubble ${isUser ? "user" : "ai"}`;
      bubble.textContent = text;

      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function addTypingIndicator() {
      removeWelcome();
      const row = document.createElement("div");
      row.className = "msg-row";
      row.id = "typing-row";

      const avatar = document.createElement("div");
      avatar.className = "avatar ai";
      avatar.textContent = "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble ai";
      bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTypingIndicator() {
      const r = document.getElementById("typing-row");
      if (r) r.remove();
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || isTyping) return;

      isTyping = true;
      sendBtn.disabled = true;
      chatInput.value = "";
      chatInput.style.height = "auto";

      addMessage("user", text);
      history.push({ role: "user", content: text });
      addTypingIndicator();

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Access-Password": ACCESS_PASSWORD,
          },
          body: JSON.stringify({ messages: history }),
        });

        const data = await res.json();
        removeTypingIndicator();

        let reply;
        if (data?.content?.[0]?.text) {
          reply = data.content[0].text;
        } else if (data?.error) {
          reply = `⚠️ API Error: ${data.error.message || JSON.stringify(data.error)}`;
        } else {
          reply = "⚠️ Unexpected response: " + JSON.stringify(data).slice(0, 200);
        }

        addMessage("assistant", reply);
        if (!reply.startsWith("⚠️")) {
          history.push({ role: "assistant", content: reply });
        }

      } catch (err) {
        removeTypingIndicator();
        addMessage("assistant", "Connection error. Please try again.");
      }

      isTyping = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }

    sendBtn.addEventListener("click", sendMessage);
    chatInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    chatInput.addEventListener("input", () => {
      chatInput.style.height = "auto";
      chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + "px";
    });
  </script>
</body>
</html>
